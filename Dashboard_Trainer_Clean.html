<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAINING FR - TRAINER DASHBOARD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --fg: #f5f5f5;
            --accent: #a855f7;
            --blue: #3b82f6;
            --red: #ef4444;
            --card-bg: rgba(255,255,255,0.03);
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Layout */
        .sidebar {
            width: 280px;
            border-right: 1px solid #222;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: fixed;
            height: 100vh;
        }

        .main-content {
            margin-left: 280px;
            padding: 100px;
            width: 100%;
            max-width: 1200px;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { 
            margin-bottom: 20px; 
            font-weight: 700; 
            font-size: 14px; 
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
        }
        nav li:hover, nav li.active { opacity: 1; }
        nav li.active { color: var(--accent); }

        /* Components */
        .card {
            border: 1px solid #222;
            background: var(--card-bg);
            padding: 30px;
            margin-bottom: 30px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            border: 1px solid #222;
            padding: 20px;
            background: var(--card-bg);
        }

        .stat-label { font-size: 10px; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: 700; }

        .btn {
            background: var(--fg);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 4px 4px 0px var(--accent);
            cursor: pointer;
            transition: 0.1s;
        }
        .btn:hover { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--accent); }
        .btn-small { padding: 6px 12px; font-size: 10px; box-shadow: 2px 2px 0px var(--accent); }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #111;
        }
        .row:last-child { border: none; }
        
        .tag { font-weight: 700; color: var(--accent); font-size: 14px; }

        .input {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
        }
        .input:focus { border-color: var(--accent); }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 60px;
        }

        .skin-render {
            width: 120px;
            height: 120px;
            border: 1px solid var(--accent);
            background: #000;
            padding: 10px;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            border: 1px solid #222;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.01);
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            border: 1px solid #444;
        }

        .tier-mini-grid {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .tier-mini-badge {
            background: #111;
            border: 1px solid #222;
            padding: 4px 8px;
            font-size: 9px;
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        const Sidebar = ({ activeView, setView }) => (
            <div className="sidebar">
                <div className="logo">
                    <span style={{color: 'var(--blue)'}}>TRAIN</span>ING <span style={{color: 'var(--red)'}}>FR</span>
                </div>
                <nav>
                    <ul>
                        <li className={activeView === 'overview' ? 'active' : ''} onClick={() => setView('overview')}>DASHBOARD</li>
                        <li className={activeView === 'roster' ? 'active' : ''} onClick={() => setView('roster')}>MES ÉLÈVES</li>
                        <li className={activeView === 'wiki' ? 'active' : ''} onClick={() => setView('wiki')}>ÉDITEUR WIKI</li>
                        <li className={activeView === 'lookup' ? 'active' : ''} onClick={() => setView('lookup')}>LOOKUP</li>
                    </ul>
                </nav>
                <div style={{ marginTop: 'auto', fontSize: '10px', opacity: 0.3 }}>
                    PVP_LAB_SYSTEM<br/>v1.4_STABLE<br/>ROLE: TRAINER
                </div>
            </div>
        );

        const Overview = () => (
            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>
                <div className="profile-header">
                    <img src="https://render.crafty.gg/3d/bust/Trainer_Sensei" className="skin-render" alt="Trainer" />
                    <div>
                        <h1 style={{ fontSize: '40px', margin: 0, letterSpacing: '-2px' }}>BIENVENUE, COACH</h1>
                        <p style={{ opacity: 0.5, margin: '5px 0' }}>Rôle : Formateur Certifié </p>
                    </div>
                </div>

                <div className="stat-grid">
                    <div className="stat-card">
                        <div className="stat-label">Quotas de Sessions (Mensuel)</div>
                        <div className="stat-value" style={{color: 'var(--accent)'}}>12 / 10</div>
                        <div style={{fontSize: '9px', opacity: 0.4, marginTop: '5px'}}>MINIMUM REQUIS ATTEINT (BONUS POSSIBLE)</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-label">Élèves Actifs</div>
                        <div className="stat-value">12</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-label">Taux de réussite</div>
                        <div className="stat-value" style={{color: '#22c55e'}}>94%</div>
                    </div>
                </div>

                <div className="card">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '25px' }}>
                        <h2 style={{ fontSize: '14px', margin: 0, opacity: 0.7 }}>SESSIONS À VENIR</h2>
                        <button className="btn btn-small">+ CRÉER UNE SESSION</button>
                    </div>
                    <div className="row">
                        <div>
                            <div style={{fontWeight: 700}}>Entraînement Crystal PvP</div>
                            <div style={{fontSize: '10px', opacity: 0.5}}>Aujourd'hui, 18:00 - Avec @PlayerOne</div>
                        </div>
                        <button className="btn btn-small">DÉMARRER</button>
                    </div>
                    <div className="row">
                        <div>
                            <div style={{fontWeight: 700}}>Review Sword 1.20</div>
                            <div style={{fontSize: '10px', opacity: 0.5}}>Demain, 14:30 - Avec @PlayerTwo</div>
                        </div>
                        <button className="btn btn-small">DÉMARRER</button>
                    </div>
                </div>
            </motion.div>
        );

        const Roster = () => {
            const students = [
                { 
                    name: 'Brillants', 
                    tiers: { sword: 'HT3', axe: 'LT1', crystal: 'HT3', uhc: 'LT2', pot: 'HT2' },
                    progress: '+12%' 
                },
                { 
                    name: 'Steve', 
                    tiers: { sword: 'LT1', axe: 'LT2', crystal: 'N/A', uhc: 'LT3', pot: 'LT1' },
                    progress: '+5%' 
                },
                { 
                    name: 'Alex', 
                    tiers: { sword: 'HT2', axe: 'HT3', crystal: 'LT1', uhc: 'HT3', pot: 'HT1' },
                    progress: '+20%' 
                }
            ];

            return (
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>
                    <h1 style={{ fontSize: '32px', marginBottom: '30px' }}>MES ÉLÈVES</h1>
                    <div className="card">
                        <input className="input" placeholder="Rechercher un élève..." />
                        {students.map(s => (
                            <div key={s.name} className="student-item" style={{ alignItems: 'flex-start', paddingTop: '20px', paddingBottom: '20px' }}>
                                <img src={`https://render.crafty.gg/3d/bust/${s.name}`} className="student-avatar" style={{ width: '50px', height: '50px' }} />
                                <div style={{ flex: 1 }}>
                                    <div style={{ fontWeight: 700, fontSize: '18px', marginBottom: '10px' }}>{s.name.toUpperCase()}</div>
                                    <div className="tier-mini-grid" style={{ flexWrap: 'wrap' }}>
                                        <div className="tier-mini-badge">SWORD: {s.tiers.sword}</div>
                                        <div className="tier-mini-badge">AXE: {s.tiers.axe}</div>
                                        <div className="tier-mini-badge">CRYSTAL: {s.tiers.crystal}</div>
                                        <div className="tier-mini-badge">UHC: {s.tiers.uhc}</div>
                                        <div className="tier-mini-badge">POT: {s.tiers.pot}</div>
                                    </div>
                                </div>
                                <div style={{ textAlign: 'right', marginLeft: '20px' }}>
                                    <div className="tag" style={{ color: '#22c55e', fontSize: '18px' }}>{s.progress}</div>
                                    <div style={{ fontSize: '10px', opacity: 0.3, marginBottom: '15px' }}>Progression</div>
                                    <button className="btn btn-small">DÉTAILS</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </motion.div>
            );
        };

        const WikiEditor = () => (
            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>
                <h1 style={{ fontSize: '32px', marginBottom: '30px' }}>WIKI PVP</h1>
                <div className="card" style={{ textAlign: 'center', padding: '100px 40px', borderStyle: 'dashed' }}>
                    <div style={{ fontSize: '48px', marginBottom: '20px' }}>🚧</div>
                    <h2 style={{ fontSize: '20px', letterSpacing: '-1px', marginBottom: '10px' }}>SYSTÈME EN CONSTRUCTION</h2>
                    <p style={{ opacity: 0.5, fontSize: '12px', maxWidth: '400px', margin: '0 auto' }}>
                        L'éditeur de Wiki et la base de données technique sont en cours de déploiement par l'équipe système.
                    </p>
                    <div style={{ marginTop: '40px', fontSize: '10px', opacity: 0.3, fontFamily: 'monospace' }}>
                        STATUS: COMPILING_ASSETS... 42%
                    </div>
                </div>
            </motion.div>
        );

        const Lookup = () => {
            const [query, setQuery] = React.useState('');
            const [result, setResult] = React.useState('Steve');

            return (
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>
                    <h1 style={{ fontSize: '32px', marginBottom: '30px' }}>RECHERCHE TACTIQUE</h1>
                    <div className="card">
                        <input 
                            className="input" 
                            placeholder="Pseudo Minecraft..." 
                            onChange={(e) => setQuery(e.target.value)}
                        />
                        <button className="btn" onClick={() => setResult(query || 'Steve')}>RECHERCHER</button>
                    </div>

                    <div className="card" style={{ display: 'flex', gap: '40px', alignItems: 'center' }}>
                        <img src={`https://render.crafty.gg/3d/bust/${result}`} style={{ width: '150px', border: '1px solid var(--accent)' }} />
                        <div>
                            <h3 style={{ fontSize: '24px', margin: '0 0 10px 0' }}>{result.toUpperCase()}</h3>
                            <p style={{ opacity: 0.5, fontSize: '12px' }}>Statut : ANALYSÉ // MCTIERS_CONNECTED</p>
                            <div style={{ marginTop: '20px', display: 'flex', gap: '10px' }}>
                                <span style={{ background: '#222', padding: '5px 10px', fontSize: '10px' }}>TIER: HT3</span>
                                <span style={{ background: '#222', padding: '5px 10px', fontSize: '10px' }}>SERVER: EU</span>
                            </div>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState('overview');

            return (
                <React.Fragment>
                    <Sidebar activeView={view} setView={setView} />
                    <main className="main-content">
                        {view === 'overview' && <Overview />}
                        {view === 'roster' && <Roster />}
                        {view === 'wiki' && <WikiEditor />}
                        {view === 'lookup' && <Lookup />}
                    </main>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
