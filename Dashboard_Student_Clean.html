<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAINING FR - DASHBOARD style </title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --fg: #f5f5f5;
            --accent: #a855f7;
            --blue: #3b82f6;
            --red: #ef4444;
            --card-bg: rgba(255,255,255,0.03);
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Layout */
        .sidebar {
            width: 280px;
            border-right: 1px solid #222;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: fixed;
            height: 100vh;
        }

        .main-content {
            margin-left: 280px;
            padding: 100px;
            width: 100%;
            max-width: 1200px;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { 
            margin-bottom: 20px; 
            font-weight: 700; 
            font-size: 14px; 
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
        }
        nav li:hover, nav li.active { opacity: 1; }
        nav li.active { color: var(--accent); }

        /* Components */
        .card {
            border: 1px solid #222;
            background: var(--card-bg);
            padding: 30px;
            margin-bottom: 30px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            border: 1px solid #222;
            padding: 20px;
            background: var(--card-bg);
        }

        .stat-label { font-size: 10px; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: 700; }

        .btn {
            background: var(--fg);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 4px 4px 0px var(--accent);
            cursor: pointer;
            transition: 0.1s;
        }
        .btn:hover { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--accent); }

        .tier-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #111;
        }
        .tier-row:last-child { border: none; }
        .tier-tag { font-weight: 700; color: var(--accent); font-size: 18px; }

        .lookup-input {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
        }
        .lookup-input:focus { border-color: var(--accent); }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 60px;
        }

        .skin-render {
            width: 120px;
            height: 120px;
            border: 1px solid var(--accent);
            background: #000;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        const Sidebar = ({ activeView, setView }) => (
            <div className="sidebar">
                <div className="logo">
                    <span style={{color: 'var(--blue)'}}>TRAIN</span>ING <span style={{color: 'var(--red)'}}>FR</span>
                </div>
                <nav>
                    <ul>
                        <li className={activeView === 'overview' ? 'active' : ''} onClick={() => setView('overview')}>DASHBOARD</li>
                        <li className={activeView === 'lookup' ? 'active' : ''} onClick={() => setView('lookup')}>LOOKUP</li>
                        <li className={activeView === 'wiki' ? 'active' : ''} onClick={() => setView('wiki')}>WIKI</li>
                    </ul>
                </nav>
                <div style={{ marginTop: 'auto', fontSize: '10px', opacity: 0.3 }}>
                    PVP_LAB_SYSTEM<br/>v1.4_STABLE
                </div>
            </div>
        );

        const Overview = () => (
            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>
                <div className="profile-header">
                    <img src="https://render.crafty.gg/3d/bust/nozaii_Tv" className="skin-render" alt="Steve" />
                    <div>
                        <h1 style={{ fontSize: '40px', margin: 0, letterSpacing: '-2px' }}>BIENVENUE, PLAYER</h1>
                        <p style={{ opacity: 0.5, margin: '5px 0' }}>Rôle : Étudiant </p>
                    </div>
                </div>

                <div className="stat-grid">
                    <div className="stat-card">
                        <div className="stat-label">Points Totaux</div>
                        <div className="stat-value">0</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-label">Rang Global</div>
                        <div className="stat-value">#0</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-label">Progression 7j</div>
                        <div className="stat-value" style={{color: '#22c55e'}}>+0 PTS</div>
                    </div>
                </div>

                <div className="card">
                    <h2 style={{ fontSize: '14px', marginBottom: '25px', opacity: 0.7 }}>MES TIERS ACTUELS</h2>
                    <div className="tier-row">
                        <span>Sword</span>
                        <span className="tier-tag">N/A</span>
                    </div>
                    <div className="tier-row">
                        <span>Axe</span>
                        <span className="tier-tag">N/A</span>
                    </div>
                    <div className="tier-row">
                        <span>Crystal</span>
                        <span className="tier-tag">N/A</span>
                    </div>
                </div>
            </motion.div>
        );

        const Lookup = () => {
            const [query, setQuery] = React.useState('');
            const [result, setResult] = React.useState('Steve');

            return (
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>
                    <h1 style={{ fontSize: '32px', marginBottom: '30px' }}>RECHERCHE </h1>
                    <div className="card">
                        <input 
                            className="lookup-input" 
                            placeholder="Pseudo Minecraft..." 
                            onChange={(e) => setQuery(e.target.value)}
                        />
                        <button className="btn" onClick={() => setResult(query || 'Steve')}>RECHERCHER</button>
                    </div>

                    <div className="card" style={{ display: 'flex', gap: '40px', alignItems: 'center' }}>
                        <img src={`https://render.crafty.gg/3d/bust/${result}`} style={{ width: '150px', border: '1px solid var(--accent)' }} />
                        <div>
                            <h3 style={{ fontSize: '24px', margin: '0 0 10px 0' }}>{result.toUpperCase()}</h3>
                            <p style={{ opacity: 0.5, fontSize: '12px' }}>Statut : N/A // N/A</p>
                            <div style={{ marginTop: '20px', display: 'flex', gap: '10px' }}>
                                <span style={{ background: '#222', padding: '5px 10px', fontSize: '10px' }}>TIER: N/A</span>
                                <span style={{ background: '#222', padding: '5px 10px', fontSize: '10px' }}>N/A</span>
                            </div>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState('overview');

            return (
                <React.Fragment>
                    <Sidebar activeView={view} setView={setView} />
                    <main className="main-content">
                        {view === 'overview' && <Overview />}
                        {view === 'lookup' && <Lookup />}
                        {view === 'wiki' && <div className="card">Interface Wiki en cours de déploiement...</div>}
                    </main>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
