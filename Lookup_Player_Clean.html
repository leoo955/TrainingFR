<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAINING FR - LOOKUP TACTIQUE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --fg: #f5f5f5;
            --accent: #a855f7;
            --blue: #3b82f6;
            --red: #ef4444;
            --card-bg: rgba(255,255,255,0.03);
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 60px;
        }

        .search-box {
            display: flex;
            gap: 0;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 20px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        .btn-search {
            background: var(--fg);
            color: var(--bg);
            border: none;
            padding: 0 40px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-search:hover {
            background: var(--accent);
            color: white;
        }

        .result-card {
            border: 1px solid #222;
            background: var(--card-bg);
            padding: 40px;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .skin-container {
            width: 180px;
            height: 180px;
            background: #000;
            border: 1px solid var(--accent);
            padding: 10px;
            flex-shrink: 0;
        }

        .skin-render {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .player-id {
            font-size: 12px;
            opacity: 0.3;
            margin-bottom: 30px;
            font-family: monospace;
        }

        .tier-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .tier-item {
            background: #111;
            border: 1px solid #222;
            padding: 15px;
        }

        .tier-label {
            font-size: 9px;
            opacity: 0.4;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .tier-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            opacity: 0.2;
            padding: 100px 0;
            font-size: 14px;
            border: 1px dashed #333;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            font-size: 11px;
            opacity: 0.4;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }
        .back-link:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;

        const LookupPage = () => {
            const [query, setQuery] = React.useState('');
            const [player, setPlayer] = React.useState(null);
            const [isLoading, setIsLoading] = React.useState(false);

            const handleSearch = (e) => {
                e.preventDefault();
                if (!query) return;
                
                setIsLoading(true);
                // Simulation API
                setTimeout(() => {
                    setPlayer({
                        name: query,
                        uuid: '069a79f4-44e9-4726-a5be-fca90e38aaf5',
                        tiers: {
                            sword: 'HT3',
                            axe: 'LT1',
                            crystal: 'HT2',
                            uhc: 'LT2'
                        }
                    });
                    setIsLoading(false);
                }, 800);
            };

            return (
                <div className="container">
                    <a href="Dashboard_Owner_Clean.html" className="back-link">← RETOUR AU DASHBOARD</a>
                    
                    <div className="logo">
                        <span style={{color: 'var(--blue)'}}>TRAIN</span>ING <span style={{color: 'var(--red)'}}>FR</span> <span style={{opacity: 0.2}}>/</span> SCANNER
                    </div>

                    <form onSubmit={handleSearch} className="search-box">
                        <input 
                            className="input" 
                            placeholder="ENTRER LE PSEUDO MINECRAFT..." 
                            value={query}
                            onChange={(e) => setQuery(e.target.value)}
                            autoFocus
                        />
                        <button type="submit" className="btn-search">
                            {isLoading ? 'SCAN...' : 'ANALYSER'}
                        </button>
                    </form>

                    <AnimatePresence mode="wait">
                        {player ? (
                            <motion.div 
                                key={player.name}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, scale: 0.95 }}
                                className="result-card"
                            >
                                <div className="skin-container">
                                    <img 
                                        src={`https://render.crafty.gg/3d/bust/${player.name}`} 
                                        className="skin-render"
                                        alt={player.name}
                                    />
                                </div>
                                <div className="player-info">
                                    <h2 className="player-name">{player.name.toUpperCase()}</h2>
                                    <div className="player-id">ID: {player.uuid}</div>
                                    
                                    <div className="tier-grid">
                                        <div className="tier-item">
                                            <div className="tier-label">Sword 1.20</div>
                                            <div className="tier-value">{player.tiers.sword}</div>
                                        </div>
                                        <div className="tier-item">
                                            <div className="tier-label">Axe Shield</div>
                                            <div className="tier-value">{player.tiers.axe}</div>
                                        </div>
                                        <div className="tier-item">
                                            <div className="tier-label">Crystal PvP</div>
                                            <div className="tier-value">{player.tiers.crystal}</div>
                                        </div>
                                        <div className="tier-item">
                                            <div className="tier-label">UHC / Pot</div>
                                            <div className="tier-value">{player.tiers.uhc}</div>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        ) : !isLoading && (
                            <div className="empty-state">
                                EN ATTENTE DE CIBLE...
                            </div>
                        )}
                    </AnimatePresence>
                    
                    <div style={{ marginTop: '40px', textAlign: 'center', fontSize: '10px', opacity: 0.15, fontFamily: 'monospace' }}>
                        PRISMA_ENGINE // CRAFTY_GG_CONNECTED // FRANCE_TIERS_DB
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LookupPage />);
    </script>
</body>
</html>
