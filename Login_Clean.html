<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAINING FR - CONNEXION</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --fg: #f5f5f5;
            --accent: #a855f7;
            --blue: #3b82f6;
            --red: #ef4444;
            --discord: #5865F2;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 60px;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 64px;
            line-height: 0.9;
            margin-bottom: 24px;
            font-weight: 900;
            letter-spacing: -3px;
        }

        p {
            opacity: 0.5;
            font-size: 16px;
            max-width: 400px;
            margin: 0 auto 50px;
            line-height: 1.5;
        }

        .btn-discord {
            background: var(--discord);
            color: white;
            border: none;
            padding: 20px 40px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 16px;
            box-shadow: 8px 8px 0px #3c45a5;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            text-decoration: none;
        }

        .btn-discord:hover {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #3c45a5;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--fg);
            opacity: 0.3;
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
        }

        .back-link:hover { opacity: 0.8; }

        .discord-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        const DiscordIcon = () => (
            <svg className="discord-icon" viewBox="0 0 24 24">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z"/>
            </svg>
        );

        const App = () => {
            return (
                <div className="container">
                    <motion.div 
                        initial={{ opacity: 0, y: -20 }} 
                        animate={{ opacity: 1, y: 0 }}
                        className="logo"
                    >
                        <span style={{color: 'var(--blue)'}}>TRAIN</span>ING <span style={{color: 'var(--red)'}}>FR</span>
                    </motion.div>

                    <main>
                        <motion.div 
                            initial={{ opacity: 0, y: 30 }} 
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.1 }}
                        >
                            <h1>ACCÈS<br/><span style={{color: 'var(--accent)'}}>RESTREINT.</span></h1>
                            <p>
                                Connecte-toi via Discord pour accéder à tes outils d'entraînement.
                            </p>
                            
                            <button className="btn-discord">
                                <DiscordIcon />
                                SE CONNECTER AVEC DISCORD
                            </button>

                            <a href="#" className="back-link">← Retourner à l'accueil</a>
                        </motion.div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
