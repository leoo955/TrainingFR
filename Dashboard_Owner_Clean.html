<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TRAINING FR - ROOT</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --fg: #f5f5f5; --accent: #a855f7; --blue: #3b82f6; --red: #ef4444; }
        body { background: var(--bg); color: var(--fg); font-family: "Space Mono", monospace; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; border-right: 1px solid #222; padding: 40px; position: fixed; height: 100vh; background: var(--bg); }
        .main-content { margin-left: 280px; padding: 80px 100px; width: 100%; max-width: 1200px; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; }
        nav ul { list-style: none; padding: 0; }
        nav li { margin-bottom: 15px; font-weight: 700; font-size: 13px; cursor: pointer; opacity: 0.4; transition: 0.2s; }
        nav li:hover, nav li.active { opacity: 1; }
        nav li.active { color: var(--accent); }
        .section-label { font-size: 9px; opacity: 0.2; margin: 20px 0 10px 0; text-transform: uppercase; }
        .card { border: 1px solid #222; background: rgba(255,255,255,0.03); padding: 30px; margin-bottom: 30px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { border: 1px solid #222; padding: 20px; background: rgba(255,255,255,0.03); }
        .stat-label { font-size: 10px; opacity: 0.5; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .btn { background: var(--fg); color: var(--bg); border: none; padding: 12px 24px; font-weight: 700; font-size: 12px; box-shadow: 4px 4px 0px var(--accent); cursor: pointer; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; }
        .skin-render { width: 100px; height: 100px; border: 1px solid var(--accent); background: #000; padding: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { motion } = window.Motion;
        const Sidebar = ({ activeView, setView }) => (
            <div className="sidebar">
                <div className="logo"><span style={{color: "var(--blue)"}}>TRAIN</span>ING <span style={{color: "var(--red)"}}>FR</span></div>
                <nav>
                    <div className="section-label">Administration</div>
                    <ul>
                        <li className={activeView === "overview" ? "active" : ""} onClick={() => setView("overview")}>DASHBOARD</li>
                        <li className={activeView === "users" ? "active" : ""} onClick={() => setView("users")}>UTILISATEURS</li>
                        <li className={activeView === "audit" ? "active" : ""} onClick={() => setView("audit")}>AUDIT LOGS</li>
                    </ul>
                    <div className="section-label">Coaching</div>
                    <ul>
                        <li className={activeView === "roster" ? "active" : ""} onClick={() => setView("roster")}>MES ÉLÈVES</li>
                        <li className={activeView === "wiki" ? "active" : ""} onClick={() => setView("wiki')}>WIKI</li>
                    </ul>
                </nav>
            </div>
        );
        const Overview = () => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: "30px", marginBottom: "50px" }}>
                    <img src="https://render.crafty.gg/3d/bust/Owner_System" className="skin-render" />
                    <div><h1 style={{ fontSize: "32px", margin: 0 }}>ROOT_COMMAND</h1><p style={{ opacity: 0.5 }}>Administrateur & Coach</p></div>
                </div>
                <div className="stat-grid">
                    <div className="stat-card"><div className="stat-label">Users</div><div className="stat-value">154</div></div>
                    <div className="stat-card"><div className="stat-label">Quota Session</div><div className="stat-value">12 / 10</div></div>
                    <div className="stat-card"><div className="stat-label">System</div><div className="stat-value" style={{color: "#22c55e"}}>ONLINE</div></div>
                </div>
            </motion.div>
        );
        const App = () => {
            const [view, setView] = React.useState("overview");
            return (
                <React.Fragment>
                    <Sidebar activeView={view} setView={setView} />
                    <main className="main-content">
                        {view === "overview" && <Overview />}
                        {view !== "overview" && <div className="card">MODULE_{view.toUpperCase()}_ROOT_ACCESS</div>}
                    </main>
                </React.Fragment>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
