<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAINING FR - WIKI EDITOR</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --fg: #f5f5f5;
            --accent: #a855f7;
            --border: #222;
            --card-bg: #0a0a0a;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 40px;
            position: fixed;
            height: 100vh;
            background: var(--bg);
        }

        .main-editor {
            margin-left: 300px;
            padding: 60px 100px;
            width: calc(100% - 300px);
            max-width: 900px;
        }

        /* Editor Components */
        .editor-header {
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
        }

        .input-title {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 42px;
            font-weight: 900;
            outline: none;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .input-meta {
            background: #111;
            border: 1px solid #333;
            color: var(--accent);
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 10px;
            outline: none;
        }

        /* Blocks */
        .block-container {
            position: relative;
            margin-bottom: 20px;
            border: 1px solid transparent;
            transition: 0.2s;
            padding: 10px;
        }
        .block-container:hover {
            border-color: #333;
            background: rgba(255,255,255,0.01);
        }

        .block-actions {
            position: absolute;
            right: -60px;
            top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
            transition: 0.2s;
        }
        .block-container:hover .block-actions { opacity: 1; right: -50px; }

        .action-btn {
            background: #222;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .action-btn:hover { background: var(--accent); }

        .textarea-block {
            width: 100%;
            background: transparent;
            border: 1px solid #222;
            color: rgba(255,255,255,0.8);
            padding: 15px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        .textarea-block:focus { border-color: var(--accent); }

        .alert-editor {
            border-left: 4px solid var(--accent);
            background: rgba(168, 85, 247, 0.05);
        }

        .code-editor {
            background: #000;
            color: #22c55e;
            font-family: 'Courier New', monospace;
        }

        /* Tool Shelf */
        .tool-shelf {
            display: flex;
            gap: 10px;
            margin-top: 50px;
            padding: 20px;
            border: 1px dashed #333;
            justify-content: center;
        }

        .tool-btn {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .tool-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-publish {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 40px;
            box-shadow: 6px 6px 0px white;
        }
        .btn-publish:hover {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px white;
        }

        .tag-pill {
            display: inline-block;
            font-size: 9px;
            padding: 2px 6px;
            background: #222;
            margin-right: 5px;
            opacity: 0.5;
        }

        .back-link {
            font-size: 11px;
            opacity: 0.3;
            text-decoration: none;
            color: white;
            margin-bottom: 40px;
            display: block;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, Reorder } = window.Motion;

        const WikiEditor = () => {
            const [title, setTitle] = React.useState('NOUVELLE LEÇON');
            const [category, setCategory] = React.useState('MÉCANIQUES');
            const [blocks, setBlocks] = React.useState([
                { id: '1', type: 'text', content: 'Commencez à rédiger votre leçon ici. Expliquez la mécanique de manière claire et concise.' },
                { id: '2', type: 'alert', content: 'CONSEIL : Utilisez le W-Tap pour maximiser votre impact.' }
            ]);

            const addBlock = (type) => {
                const newBlock = {
                    id: Date.now().toString(),
                    type,
                    content: type === 'text' ? 'Nouveau paragraphe...' : 
                             type === 'alert' ? 'Avis pédagogique important...' :
                             type === 'code' ? '// Logique technique ici' : 'Lien_Vidéo_Demo'
                };
                setBlocks([...blocks, newBlock]);
            };

            const updateBlock = (id, content) => {
                setBlocks(blocks.map(b => b.id === id ? { ...b, content } : b));
            };

            const removeBlock = (id) => {
                setBlocks(blocks.filter(b => b.id !== id));
            };

            return (
                <React.Fragment>
                    <div className="sidebar">
                        <a href="Wiki_Clean.html" className="back-link">← RETOUR AU WIKI</a>
                        <div style={{ fontSize: '20px', fontWeight: 900, marginBottom: '40px' }}>
                            <span style={{color: 'var(--accent)'}}>WIKI</span>_LAB
                        </div>
                        
                        <div style={{ marginBottom: '30px' }}>
                            <div style={{ fontSize: '9px', opacity: 0.3, marginBottom: '10px' }}>CONFIG_ARTICLE</div>
                            <input 
                                className="input-meta" 
                                value={category} 
                                onChange={(e) => setCategory(e.target.value.toUpperCase())}
                                placeholder="CATÉGORIE"
                            />
                        </div>

                        <div style={{ fontSize: '9px', opacity: 0.3, marginBottom: '10px' }}>STRUCTURE_ACTUELLE</div>
                        {blocks.map((b, i) => (
                            <div key={b.id} className="tag-pill">
                                {i+1}. {b.type.toUpperCase()}
                            </div>
                        ))}

                        <button className="btn-publish">PUBLIER L'ARTICLE</button>
                    </div>

                    <main className="main-editor">
                        <header className="editor-header">
                            <input 
                                className="input-title" 
                                value={title} 
                                onChange={(e) => setTitle(e.target.value.toUpperCase())}
                                placeholder="TITRE DE L'ARTICLE"
                            />
                            <div style={{ fontSize: '10px', opacity: 0.4 }}>
                                ÉDITEUR_OPÉRATIONNEL // ROLE: TRAINER_ROOT
                            </div>
                        </header>

                        <div className="blocks-list">
                            {blocks.map((block) => (
                                <div key={block.id} className="block-container">
                                    <div className="block-actions">
                                        <button className="action-btn" onClick={() => removeBlock(block.id)}>×</button>
                                    </div>
                                    
                                    {block.type === 'text' && (
                                        <textarea 
                                            className="textarea-block"
                                            rows="3"
                                            value={block.content}
                                            onChange={(e) => updateBlock(block.id, e.target.value)}
                                        />
                                    )}

                                    {block.type === 'alert' && (
                                        <textarea 
                                            className="textarea-block alert-editor"
                                            rows="2"
                                            value={block.content}
                                            onChange={(e) => updateBlock(block.id, e.target.value)}
                                        />
                                    )}

                                    {block.type === 'code' && (
                                        <textarea 
                                            className="textarea-block code-editor"
                                            rows="3"
                                            value={block.content}
                                            onChange={(e) => updateBlock(block.id, e.target.value)}
                                        />
                                    )}

                                    {block.type === 'video' && (
                                        <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                                            <div style={{ background: '#222', padding: '15px' }}>▶</div>
                                            <input 
                                                className="textarea-block"
                                                style={{ borderStyle: 'dashed' }}
                                                value={block.content}
                                                onChange={(e) => updateBlock(block.id, e.target.value)}
                                                placeholder="Lien de la vidéo (YouTube/Twitch)..."
                                            />
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="tool-shelf">
                            <button className="tool-btn" onClick={() => addBlock('text')}>+ TEXTE</button>
                            <button className="tool-btn" onClick={() => addBlock('alert')}>+ ALERTE</button>
                            <button className="tool-btn" onClick={() => addBlock('video')}>+ VIDÉO</button>
                            <button className="tool-btn" onClick={() => addBlock('code')}>+ LOGIQUE</button>
                        </div>
                    </main>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WikiEditor />);
    </script>
</body>
</html>
